# fly.toml app configuration file generated for millionare-shivji-tradingbot on 2026-05-21T14:08:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'millionare-shivji-tradingbot'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  DATA_DIR = '/data'
  LOG_DIR = '/data/logs'

[[mounts]]
  source = 'volsurge_15m_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
