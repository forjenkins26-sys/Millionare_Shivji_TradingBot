# fly.toml app configuration file generated for millionare-shivji-tradingbot on 2026-05-21T14:08:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'millionare-shivji-tradingbot'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  DATA_DIR = '/data'
  LOG_DIR = '/data/logs'
  CANDLE_SECONDS = '300'
  MAX_SIGNAL_AGE_S = '150'
  FIXED_SL_PTS = '250.0'
  FIXED_TP_PTS = '300.0'
  MIN_BODY_PTS = '50.0'
  MAX_PRE_ENTRY_SLIP_PTS = '70.0'
  VS_BURST_MULT = '2.0'
  USE_BREAKOUT_CTX = 'true'
  BREAKOUT_CTX_BARS = '5'

[[mounts]]
  source = 'volsurge_5m_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 10
    soft_limit = 5

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
